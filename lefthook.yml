# Commit guards: lint staged files before they land in git.
# Required tools:
#   skyway          https://github.com/skylence-be/skyway (install to PATH)
#   yamllint        brew install yamllint
#   markdownlint-cli2  npm install -g markdownlint-cli2
pre-commit:
  jobs:
    - name: sky lint
      glob: "**.sky"
      run: skyway lint {staged_files}
    - name: manifest validate
      glob: "manifest.yaml"
      run: bash scripts/validate-manifest.sh
    - name: yaml lint yml
      glob: "**.yml"
      run: yamllint -d relaxed {staged_files}
    - name: yaml lint yaml
      glob: "**.yaml"
      run: yamllint -d relaxed {staged_files}
    - name: markdown lint
      glob: "**.md"
      run: markdownlint-cli2 {staged_files}

# Push guard: full-repo lint before code reaches the remote.
pre-push:
  jobs:
    - name: sky lint all
      glob: "**.sky"
      run: skyway lint {all_files}
    - name: yaml lint all yml
      glob: "**.yml"
      run: yamllint -d relaxed {push_files}
    - name: yaml lint all yaml
      glob: "**.yaml"
      run: yamllint -d relaxed {push_files}
    - name: markdown lint all
      glob: "**.md"
      run: markdownlint-cli2 {push_files}
