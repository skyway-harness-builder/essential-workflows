name: Lint workflows
on:
  workflow_dispatch:

jobs:
  sky-lint:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6
      - uses: skyway-harness-builder/lint-action@v2
        with:
          paths: "**/*.sky"

  manifest-validate:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6
      - name: Validate manifest.yaml
        run: bash scripts/validate-manifest.sh
