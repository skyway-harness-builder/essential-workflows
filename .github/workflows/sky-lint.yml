name: Lint workflows
on:
  push:
  pull_request:

jobs:
  sky-lint:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6
      - uses: skylence-be/sky-lint-action@v2
        with:
          paths: "**/*.sky"

  manifest-validate:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6
      - name: Validate manifest.yaml
        run: bash scripts/validate-manifest.sh
