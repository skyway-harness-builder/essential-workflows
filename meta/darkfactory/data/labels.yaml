# Dark Factory lifecycle labels (source of truth; used by board-prep and darkfactory-onboarding)
# board-prep creates these on a repo via `gh label create --force` (idempotent upsert).
# darkfactory-onboarding documents the label→Status column mapping.
labels:
  - name: "triaging"
    color: "fbca04"
    description: "Issue is being classified"
  - name: "accepted"
    color: "0e8a16"
    description: "Approved for the factory to attempt"
  - name: "rejected"
    color: "ffffff"
    description: "Will not be worked on by the factory"
  - name: "ready-for-sky"
    color: "1d76db"
    description: "Queued for an implementation run"
  - name: "in-progress"
    color: "0052cc"
    description: "Sky is implementing"
  - name: "needs-review"
    color: "e4882a"
    description: "PR open, awaiting human spot-check / validator"
  - name: "approved"
    color: "2ea44f"
    description: "Validator + human passed"
  - name: "needs-fix"
    color: "d93f0b"
    description: "Validator/human bounced it back"
  - name: "escalated"
    color: "b60205"
    description: "Routed to a human (low confidence / high stakes)"
